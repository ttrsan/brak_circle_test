<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>サークルチャット風 非公式サイト</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg"></div>

  <main class="layout">
    <section class="chat-panel">
      <div class="top-circle-info">
        <div class="top-circle-title-row">
          <div id="circleNameTitle" class="top-circle-title">テストサークル</div>
          <button id="openSiteInfoButton" class="site-info-button" type="button" aria-label="サイト情報を表示">ⓘ</button>
        </div>
      </div>

      <div class="tabs">
        <button id="chatTab" class="tab active" type="button">チャット</button>
        <button id="settingTab" class="tab" type="button">設定</button>
      </div>

      <div id="chatView" class="view chat-view">
        <div id="chatLog" class="chat-log"></div>

        <form id="chatForm" class="input-area">
          <select id="currentSenderSelect" class="sender-select hidden" aria-label="送信者を選択">
            <option value="sensei">先生</option>
            <option value="yuuka">ユウカ</option>
            <option value="shiroko">シロコ</option>
            <option value="hoshino">ホシノ</option>
            <option value="nonomi">ノノミ</option>
            <option value="serika">セリカ</option>
            <option value="ayane">アヤネ</option>
          </select>
          <textarea id="messageInput" maxlength="140" placeholder="内容を入力してください。" autocomplete="off" rows="1"></textarea>
          <button class="face-button" type="button" aria-label="スタンプを開く">
            <img class="stamp-button-icon" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyOCIgaGVpZ2h0PSIyOCIgdmlld0JveD0iMCAwIDI4IDI4Ij4KICA8Y2lyY2xlIGN4PSIxNCIgY3k9IjE0IiByPSIxMCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjNGE2MDcyIiBzdHJva2Utd2lkdGg9IjEuOCIvPgogIDxjaXJjbGUgY3g9IjEwLjUiIGN5PSIxMiIgcj0iMS4zIiBmaWxsPSIjNGE2MDcyIi8+CiAgPGNpcmNsZSBjeD0iMTcuNSIgY3k9IjEyIiByPSIxLjMiIGZpbGw9IiM0YTYwNzIiLz4KICA8cGF0aCBkPSJNOS41IDE3YzEuMyAxLjMgMi44IDEuOSA0LjUgMS45UzE3LjIgMTguMyAxOC41IDE3IiBmaWxsPSJub25lIiBzdHJva2U9IiM0YTYwNzIiIHN0cm9rZS13aWR0aD0iMS44IiBzdHJva2UtbGluZWNhcD0icm91bmQiLz4KPC9zdmc+" alt="スタンプ" />
          </button>
          <button class="send-button" type="submit">送信する</button>
        </form>
      </div>

      <div id="settingView" class="view setting-view hidden">
        <div class="setting-card ios-settings-card">
          <div class="setting-title">設定</div>

          <div class="ios-setting-section">
            <label class="ios-setting-row" for="circleNameInput">
              <span class="ios-setting-label">サークル名称</span>
              <input id="circleNameInput" class="ios-setting-input" type="text" maxlength="24" value="テストサークル" placeholder="サークル名称" />
            </label>

            <div class="ios-setting-row">
              <span class="ios-setting-label">メイン送信者</span>
              <div class="ios-segmented" role="radiogroup" aria-label="メイン送信者">
                <label>
                  <input type="radio" name="mainSenderMode" value="sensei" checked>
                  <span>先生</span>
                </label>
                <label>
                  <input type="radio" name="mainSenderMode" value="student">
                  <span>生徒</span>
                </label>
              </div>
            </div>

            <label id="senderNameSettingRow" class="ios-setting-row" for="senderNameInput">
              <span class="ios-setting-label">送信者名</span>
              <input id="senderNameInput" class="ios-setting-input" type="text" maxlength="12" value="先生" placeholder="送信者名" />
            </label>

            <label id="mainStudentSettingRow" class="ios-setting-row hidden" for="mainStudentSelect">
              <span class="ios-setting-label">メイン生徒</span>
              <select id="mainStudentSelect" class="ios-setting-select">
                <option value="yuuka">ユウカ</option>
                <option value="shiroko">シロコ</option>
                <option value="hoshino">ホシノ</option>
                <option value="nonomi">ノノミ</option>
                <option value="serika">セリカ</option>
                <option value="ayane">アヤネ</option>
              </select>
            </label>

            <div class="ios-setting-row">
              <span class="ios-setting-label">送信者切替</span>
              <label class="ios-switch">
                <input type="checkbox" id="senderSelectorToggle">
                <span></span>
              </label>
            </div>

            <div class="ios-setting-row">
              <span class="ios-setting-label">伏字モード</span>
              <div class="ios-segmented wide" role="radiogroup" aria-label="伏字モード">
                <label>
                  <input type="radio" name="censorMode" value="highlight" checked>
                  <span>赤文字</span>
                </label>
                <label>
                  <input type="radio" name="censorMode" value="mask">
                  <span>****</span>
                </label>
              </div>
            </div>

            <div class="ios-setting-row">
              <span class="ios-setting-label">連投表示</span>
              <div class="ios-segmented wide" role="radiogroup" aria-label="連投表示">
                <label>
                  <input type="radio" name="compactMode" value="on" checked>
                  <span>省略</span>
                </label>
                <label>
                  <input type="radio" name="compactMode" value="off">
                  <span>毎回</span>
                </label>
              </div>
            </div>

            <div class="ios-setting-row">
              <span class="ios-setting-label">NGワード応答</span>
              <label class="ios-switch">
                <input type="checkbox" id="ngResponseToggle">
                <span></span>
              </label>
            </div>

            <button id="openNgWordModalButton" class="ios-action-row" type="button">
              <span>NGワード一覧</span><span class="ios-chevron">›</span>
            </button>
            <button id="openAllowWordModalButton" class="ios-action-row" type="button">
              <span>許容ワード一覧</span><span class="ios-chevron">›</span>
            </button>
          </div>

          <div class="setting-section-title">共有</div>
          <div class="ios-setting-section">
            <button id="createShareUrlButton" class="ios-action-row" type="button">
              <span>共有URLをコピー</span><span class="ios-chevron">›</span>
            </button>
          </div>
          <div id="shareUrlStatus" class="setting-note share-url-status" aria-live="polite"></div>

          <div class="setting-section-title">詳細設定</div>
          <div class="ios-setting-section">
            <button id="clearChatButton" class="ios-action-row danger" type="button">
              <span>チャットをクリア</span><span class="ios-chevron">›</span>
            </button>

            <div class="ios-setting-row">
              <span class="ios-setting-label">メッセージ編集・削除</span>
              <label class="ios-switch">
                <input type="checkbox" id="editModeToggle">
                <span></span>
              </label>
            </div>

            <div class="ios-setting-row">
              <span class="ios-setting-label">ブラウザ保存</span>
              <label class="ios-switch">
                <input type="checkbox" id="storageModeToggle">
                <span></span>
              </label>
            </div>
          </div>

          <div class="legacy-radio-host" aria-hidden="true">
            <input type="radio" name="senderSelectorMode" value="off" checked>
            <input type="radio" name="senderSelectorMode" value="on">
            <input type="radio" name="ngResponseMode" value="on">
            <input type="radio" name="ngResponseMode" value="off" checked>
            <input type="radio" name="editMode" value="off" checked>
            <input type="radio" name="editMode" value="on">
            <input type="radio" name="storageMode" value="off" checked>
            <input type="radio" name="storageMode" value="on">
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="siteInfoModal" class="modal hidden">
    <div class="modal-window site-info-window">
      <div class="modal-header">
        <span>サイトについて</span>
        <button id="closeSiteInfoButton" class="modal-close" type="button">×</button>
      </div>

      <div class="modal-body site-info-body">
        <p>
          このサイトは、ブルーアーカイブのゲーム内チャットで使用できる文字・使用できない文字を確認するための、非公式の検証・練習サイトです。<br>
          Yostar / NEXON Games とは関係ありません。
        </p>
        <p class="site-info-credit">制作: @ttr_san</p>
      </div>
    </div>
  </div>

  <div id="stampModal" class="modal hidden">
    <div class="modal-window stamp-window">
      <div class="modal-header">
        <span>チャットスタンプ</span>
        <button id="closeStampButton" class="modal-close" type="button">×</button>
      </div>

      <div class="modal-body stamp-body">
        <div id="stampGrid" class="stamp-grid"></div>
      </div>
    </div>
  </div>

  <div id="ngWordModal" class="modal hidden">
    <div class="modal-window ngword-window">
      <div class="modal-header">
        <span>NGワード一覧</span>
        <button id="closeNgWordModalButton" class="modal-close" type="button">×</button>
      </div>

      <div class="modal-body">
        <div id="ngWordList" class="word-list"></div>
      </div>
    </div>
  </div>

  <div id="ngWordConfirmModal" class="modal hidden">
    <div class="modal-window confirm-window">
      <div class="modal-header">
        <span>確認</span>
        <button id="closeNgWordConfirmButton" class="modal-close" type="button">×</button>
      </div>

      <div class="modal-body confirm-body">
        <p>このページには性的表現を含む内容があります。<br>18歳未満の方は閲覧をご遠慮ください。</p>
        <div class="confirm-actions">
          <button id="cancelNgWordConfirmButton" class="sub-button confirm-cancel-button" type="button">キャンセル</button>
          <button id="showNgWordConfirmButton" class="sub-button confirm-ok-button" type="button">表示する</button>
        </div>
      </div>
    </div>
  </div>

  <div id="allowWordModal" class="modal hidden">
    <div class="modal-window allowword-window">
      <div class="modal-header">
        <span>許容ワード一覧</span>
        <button id="closeAllowWordModalButton" class="modal-close" type="button">×</button>
      </div>

      <div class="modal-body">
        <div id="allowWordList" class="word-list"></div>
      </div>
    </div>
  </div>

  <div id="appMessageModal" class="modal hidden">
    <div class="modal-window confirm-window">
      <div class="modal-header">
        <span id="appMessageTitle">通知</span>
        <button id="closeAppMessageButton" class="modal-close" type="button">×</button>
      </div>

      <div class="modal-body confirm-body">
        <p id="appMessageText"></p>
        <div class="confirm-actions single-action">
          <button id="okAppMessageButton" class="sub-button confirm-ok-button" type="button">OK</button>
        </div>
      </div>
    </div>
  </div>

  <div id="appConfirmModal" class="modal hidden">
    <div class="modal-window confirm-window">
      <div class="modal-header">
        <span id="appConfirmTitle">確認</span>
        <button id="closeAppConfirmButton" class="modal-close" type="button">×</button>
      </div>

      <div class="modal-body confirm-body">
        <p id="appConfirmText"></p>
        <div class="confirm-actions">
          <button id="cancelAppConfirmButton" class="sub-button confirm-cancel-button" type="button">キャンセル</button>
          <button id="okAppConfirmButton" class="sub-button confirm-ok-button" type="button">OK</button>
        </div>
      </div>
    </div>
  </div>


  <script src="sender-profiles.js"></script>
  <script src="word-settings.js"></script>
  <script src="script.js"></script>
</body>
</html>
