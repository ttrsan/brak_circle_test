<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>サークルチャット風 非公式サイト</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg"></div>
<main class="layout">
    <section class="chat-panel">
      <div class="top-circle-info">
        <div class="top-circle-title-row">
          <div class="top-circle-title">テストサークル</div>
          <button id="openSiteInfoButton" class="site-info-button" type="button" aria-label="サイト情報を表示">ⓘ</button>
        </div>
      </div>

      <div class="tabs">
        <button id="chatTab" class="tab active" type="button">チャット</button>
        <button id="settingTab" class="tab" type="button">設定</button>
      </div>

      <div id="chatView" class="view chat-view">
        
        <div id="chatLog" class="chat-log"></div>

<form id="chatForm" class="input-area">
          <input id="messageInput" type="text" maxlength="140" placeholder="内容を入力してください。" autocomplete="off" />
          <button class="face-button" type="button">☺</button>
          <button class="send-button" type="submit">送信する</button>
        </form>
      </div>

      <div id="settingView" class="view setting-view hidden">
        <div class="setting-card">
          <div class="setting-title">チャット設定</div>
          <label class="setting-label" for="senderNameInput">送信者名</label>
          <input id="senderNameInput" class="setting-input" type="text" maxlength="12" value="先生" placeholder="送信者名を入力" />
          <p class="setting-note">ここで設定した名前は、このページを開いている間だけ使用されます。</p>

          <div class="setting-group">
            <div class="setting-label">伏字モード</div>
            <label class="radio-setting"><input type="radio" name="censorMode" value="highlight" checked><span>赤文字表示</span></label>
            <label class="radio-setting"><input type="radio" name="censorMode" value="mask"><span>****表示</span></label>
          </div>

          <button id="openNgWordModalButton" class="sub-button" type="button">NGワード一覧</button>
          <button id="openAllowWordModalButton" class="sub-button" type="button">許容ワード一覧</button>
          <button id="clearChatButton" class="sub-button" type="button">チャットをクリア</button>
        </div>
      </div>
    </section>
  </main>

  <div id="stampModal" class="modal hidden">
    <div class="modal-window">
      <div class="modal-header"><span>チャットスタンプ</span><button id="closeStampButton" class="modal-close" type="button">×</button></div>
      <div class="modal-body"><div id="stampGrid" class="stamp-grid"></div></div>
    </div>
  </div>

  <div id="ngWordModal" class="modal hidden">
    <div class="modal-window ngword-window">
      <div class="modal-header"><span>NGワード一覧</span><button id="closeNgWordModalButton" class="modal-close" type="button">×</button></div>
      <div class="modal-body"><div id="ngWordList" class="ngword-list"></div></div>
    </div>
  </div>


  <div id="allowWordModal" class="modal hidden">
    <div class="modal-window allowword-window">
      <div class="modal-header">
        <span>許容ワード一覧</span>
        <button id="closeAllowWordModalButton" class="modal-close" type="button">×</button>
      </div>

      <div class="modal-body">
        <div id="allowWordList" class="allowword-list"></div>
      </div>
    </div>
  </div>


  <div id="siteInfoModal" class="modal hidden">
    <div class="modal-window site-info-window">
      <div class="modal-header">
        <span>サイトについて</span>
        <button id="closeSiteInfoButton" class="modal-close" type="button">×</button>
      </div>

      <div class="modal-body site-info-body">
        <p>
          ブルーアーカイブのサークルチャット風の非公式サイトです。<br>
          禁止ワードの確認ができます。<br>
          Yostar / NEXON Games とは関係ありません。
        </p>
        <p class="site-info-credit">制作: @ttr_san</p>
      </div>
    </div>
  </div>

  <script src="word-settings.js"></script>
  <script src="script.js"></script>
</body>
</html>
