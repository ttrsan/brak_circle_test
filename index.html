<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>サークルチャット練習</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg"></div>

  <header class="top-bar">
    
    
    

    <div class="status-area creator-info">
      <span class="creator-text">Author: X @ttr_san</span>
    </div>
  </header>

  <main class="layout">
    <section class="left-panel">
      <h1 class="circle-name">テストサークル</h1>

      <div class="info-card">
        <div class="info-row"><span>サークルID</span><strong>000000</strong></div>
        <div class="info-row"><span>加入方式</span><strong>承認型</strong></div>
        <div class="info-row"><span>メンバー</span><strong>1 / 50</strong></div>
      </div>

      <div class="greeting-card">
        <div class="label">挨拶</div>

        <p>
          ブルーアーカイブのサークルチャット風の非公式サイトです。<br>
          Yostar / NEXON Games とは関係ありません。
        </p>
      </div>
    </section>

    <section class="chat-panel">
      <div class="tabs">
        <button id="chatTab" class="tab active" type="button">チャット</button>
        <button id="settingTab" class="tab" type="button">設定</button>
      </div>
      <div id="chatView" class="chat-view">
        <div id="chatLog" class="chat-log"></div>

        <form id="chatForm" class="input-area">
          <input id="messageInput" type="text" maxlength="140" placeholder="内容を入力してください。" autocomplete="off" />
          <button class="face-button" type="button">☺</button>
          <button class="send-button" type="submit">送信する</button>
        </form>
      </div>

      <div id="settingView" class="setting-view hidden">
        <div class="setting-card">
          <div class="setting-title">チャット設定</div>

          <label class="setting-label" for="senderNameInput">送信者名</label>
          <input id="senderNameInput" class="setting-input" type="text" maxlength="12" value="先生" placeholder="送信者名を入力" />

          <p class="setting-note">ここで設定した名前は、このページを開いている間だけ使用されます。</p>

          <div class="setting-group">
            <div class="setting-label">伏字モード</div>

            <label class="radio-setting">
              <input type="radio" name="censorMode" value="highlight" checked>
              <span>赤文字表示</span>
            </label>

            <label class="radio-setting">
              <input type="radio" name="censorMode" value="mask">
              <span>****表示</span>
            </label>
          </div>

          
<button id="openNgWordModalButton" class="toggle-ngword-button" type="button">
  NGワード一覧を表示
</button>

<button id="applySettingButton" class="apply-setting-button" type="button">設定を反映</button>


          <button id="clearChatButton" class="clear-chat-button" type="button">チャットをクリア</button>
        </div>
      </div>
    </section>
  </main>

  
<div id="stampModal" class="stamp-modal hidden">
  <div class="stamp-window">
    <div class="stamp-header">
      <span>チャットスタンプ</span>
      <button id="closeStampButton" class="stamp-close" type="button">×</button>
    </div>

    <div class="stamp-body">
      <div id="stampGrid" class="stamp-grid"></div>
    </div>
  </div>
</div>


<div id="ngWordModal" class="ngword-modal hidden">
  <div class="ngword-window">
    <div class="ngword-header">
      <span>NGワード一覧</span>
      <button id="closeNgWordModalButton" class="ngword-close" type="button">×</button>
    </div>

    <div class="ngword-body">
      <div id="ngWordList" class="ngword-list"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
